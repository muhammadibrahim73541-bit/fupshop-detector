name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Check Python syntax
      run: |
        python -m py_compile src/utils/dataset_builder.py
        python -m py_compile src/models/model_trainer.py
        python -m py_compile src/predict.py
        python -m py_compile app/app.py
    
    - name: Test data collection
      env:
        URLHAUS_KEY: ${{ secrets.URLHAUS_KEY }}
      run: |
        cd src
        python -c "from data_collection.urlhaus_fetcher import URLHausFetcher; f = URLHausFetcher('${URLHAUS_KEY}'); urls = f.get_urls_only(limit=5); print(f'Fetched {len(urls)} URLs')"
    
    - name: Test feature extraction
      run: |
        cd src
        python -c "from features.url_features import URLFeatureExtractor; e = URLFeatureExtractor(); f = e.extract('https://www.bilka.dk'); print(f'Features extracted: {len(f)}')"
    
    - name: Test synthetic data generation
      run: |
        cd src
        python -c "from utils.dataset_builder import DatasetBuilder, SAMPLE_LEGITIMATE_URLS; b = DatasetBuilder(); urls = b.generate_typosquatting_urls(SAMPLE_LEGITIMATE_URLS, count=5); print(f'Generated {len(urls)} synthetic URLs')"
